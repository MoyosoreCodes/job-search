name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create stub config.json (required by spec)
        run: echo '{}' > config.json

      - name: Build executable
        run: pyinstaller job_search_gui.spec --noconfirm

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AI Job Search ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          files: dist/AI Job Search.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version Gist
        shell: bash
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          VERSION_CLEAN="${VERSION#v}"
          CONTENT=$(printf '{"version":"%s","url":"https://github.com/Moyo-x/job-search-api/releases/download/%s/AI%%20Job%%20Search.exe"}' "$VERSION_CLEAN" "$VERSION")
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/gists/7144732583323615545bde54ed69638a \
            -d "{\"files\":{\"version.json\":{\"content\":\"$CONTENT\"}}}"
